<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="NAFROB HUSEN KEDIR">
    <title>University Login Portal</title>
    <style> 
        h2{
            color: #09da10;
            inline-size: fit-content;
            margin: 20px 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #cececd;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header-logo {

            width: 160px;
            height: 160px;
            margin-bottom: 40px;
             display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #101411;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .user-icon {
            font-size: 80px;
            color: #888;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #5186ab;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #666;
        }

        .btn-log {
            background-color: #18312e;
            color: white;
            border: none;
            padding: 12px 60px;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .forgot-pass {
            color: #438eb9;
            text-decoration: none;
            display: block;
            margin-top: 15px;
            font-size: 14px;
            text-align: left;
        }

        /* Bottom Section Tabs */
        .verification-box {
            margin-top: 40px;
            border: 1px solid #eee;
            width: 100%;
            max-width: 500px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #5fa2d1;
            padding: 0 10px;
        }

        .tab-item {
            padding: 15px;
            color: #438eb9;
            font-size: 14px;
            cursor: pointer;
        }

        .search-area {
            padding: 20px;
            background-color: #fafafa;
            display: flex;
            gap: 5px;
        }

        .search-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-search {
            background-color: #f5f5f5;
            border: 1px solid #ccc;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2> welcome tomattu University login page</h2>

    <div class="header-logo">


        <img src="Screenshot (4).png" alt="University Logo" style="width:100%;">
    </div>

    <div class="login-container">
        <div class="user-icon">🙍🏿‍♂️</div>

        <div class="input-group">
            <input type="text" placeholder="Enter your user name">
        </div>
        
        <div class="input-group">
            <input type="password" placeholder="password">
        </div>

        <button class="btn-log">Log in</button>
        <a href="#" class="forgot-pass">Forgot your password?</a>
    </div>

    <div class="verification-box">
        <div class="tabs">
            <div class="tab-item" style="border-bottom: 3px solid #0ea557; font-weight: bold;">Official Transcript Verification</div>
        </div>
        
        <div class="tabs" style="border-bottom: none; justify-content: space-around;">
            <div class="tab-item">Student Verification</div>
            <div class="tab-item">Application Tracker</div>
        </div>
        <div class="tab-item" style="padding-left: 25px;">New Student Account</div>

        <div class="search-area">
            <input type="text" class="search-input" placeholder="Enter Verification code">
            <button class="btn-search">Search</button>
        </div>
    </div>

</body>
</html>
